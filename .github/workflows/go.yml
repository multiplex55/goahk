name: Go Windows CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Uses the latest stable Windows Server image
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 'stable' automatically resolves to the latest major/minor version
          go-version: 'stable'
          # Ensures it pulls the latest patch release if not already cached
          check-latest: true
          # Enables automatic caching for faster subsequent runs
          cache: true

      - name: Verify Go version
        run: go version

      - name: Install dependencies
        run: go mod download

      - name: Build application
        # Build all packages in the module
        run: go build -v ./...

      - name: Run tests
        # Run all tests with verbose output
        run: go test -v ./...
