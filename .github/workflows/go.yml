name: Go Windows CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.25.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true

      - name: Verify Go version
        run: go version

      - name: Verify version policy consistency
        run: go test -v ./internal/repohygiene -run TestGoVersionPolicyConsistency -count=1

      - name: Install dependencies
        run: go mod download

      - name: Verify no blocked tracked binary artifacts
        env:
          GOAHK_ALLOW_RELEASE_ARTIFACTS: ${{ github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'release-artifacts') }}
        run: cmd /c build\check-no-source-binaries.bat

      - name: Verify tracked-artifact policy (repohygiene)
        env:
          GOAHK_ALLOW_RELEASE_ARTIFACTS: ${{ github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'release-artifacts') }}
        run: go test -v ./internal/repohygiene -run TestNoTrackedBinaryArtifacts -count=1

      - name: Run build script tests (Pester)
        shell: pwsh
        run: Invoke-Pester -Path build/tests -CI

      - name: Build application
        run: go build -v ./...

      - name: Run static analysis (stdversion + vet checks)
        run: go vet ./...

      - name: Run targeted regression checks
        run: |
          go test -v ./examples -run TestWindowsTargetedCompilationRegressions -count=1
          go test -v ./internal/services/messagebox -run "TestParseIcon|TestParseOptions" -count=1
          go test -v ./internal/clipboard -run "TestEncodeUTF16_AppendsSingleNULTerminator|TestDecodeUTF16_EmptyAndTerminatorOnly|TestDecodeUTF16_InvalidSurrogateFails|TestUTF16RoundTripAndNormalizationBoundaries" -count=1

      - name: Compile-check primary examples
        run: go test -v ./examples -run "TestPrimaryExamplesBuild" -count=1

      - name: Run tests
        run: go test -v ./...
