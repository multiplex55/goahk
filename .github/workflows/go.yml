name: Go Windows CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          check-latest: true
          cache: true

      - name: Verify Go version
        run: go version

      - name: Install dependencies
        run: go mod download

      - name: Verify no tracked binary artifacts
        run: cmd /c build\check-no-source-binaries.bat

      - name: Run build script tests (Pester)
        shell: pwsh
        run: Invoke-Pester -Path build/tests -CI

      - name: Build application
        run: go build -v ./...

      - name: Run tests
        run: go test -v ./...
